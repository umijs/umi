name: Deploy Umi v3 docs to Cloudflare Pages

on:
  pull_request:
    branches:
      - 3.x
  push:
    branches:
      - 3.x
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-umi-v3
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 14 for the legacy build
        uses: actions/setup-node@v4
        with:
          node-version: 14.21.3

      - name: Build documentation
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          yarn --version
          yarn install --ignore-engines --frozen-lockfile
          yarn build
          yarn docs:build

      - name: Use Node.js 22 for deployment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler outside the workspace
        if: github.event_name != 'pull_request'
        run: |
          npm install \
            --prefix "$RUNNER_TEMP/wrangler" \
            --no-save \
            --no-audit \
            --no-fund \
            wrangler@3.90.0

      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          "$RUNNER_TEMP/wrangler/node_modules/.bin/wrangler" pages deploy dist \
            --project-name=umi-v3 \
            --branch=3.x
